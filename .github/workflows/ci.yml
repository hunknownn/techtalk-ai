# 배포는 태그(v*.*.*)에서만 일어나므로, main에 대한 일반 push는 여기서
# 빌드·린트만 검증한다 (배포 없음).
name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - "deploy/**"
      - "argocd/**"
      - "**.md"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
