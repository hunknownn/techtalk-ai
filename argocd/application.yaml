# ArgoCD Application 등록 (최초 1회 수동 apply: kubectl apply -f argocd/application.yaml)
# 이후에는 deploy/ 변경을 git push 하면 ArgoCD가 자동 sync
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techtalk
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hunknownn/techtalk-ai
    targetRevision: main
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: techtalk
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
